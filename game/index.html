<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Ninja Runner</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #00ffcc;
    }
    canvas {
      image-rendering: pixelated;
      border: 4px solid #ff00ff;
      box-shadow: 0 0 40px #ff00ff, 0 0 80px rgba(255, 0, 255, 0.3);
    }
    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 100;
      pointer-events: none;
      width: 320px;
    }
    .score-container {
      background: rgba(10, 10, 30, 0.85);
      border: 2px solid #00ffff;
      padding: 12px 18px;
      border-radius: 8px;
      box-shadow: 0 0 20px #00ffff;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 0 0 10px currentColor;
    }
    #score { color: #ffff00; }
    #distance { color: #00ffcc; }
    .label { font-size: 14px; opacity: 0.8; letter-spacing: 1px; }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="400"></canvas>

  <div id="ui">
    <div class="score-container">
      <div class="score-row"><span class="label">SCORE</span><span id="score">00000</span></div>
      <div class="score-row"><span class="label">DISTANCE</span><span id="distance">0m</span></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const distanceEl = document.getElementById('distance');

    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playBeep(frequency = 800, duration = 80, type = 'sine', volume = 0.3) {
      initAudio();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
      gain.gain.value = volume;
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.start();
      setTimeout(() => oscillator.stop(), duration);
    }

    let gameRunning = false;
    let score = 0;
    let distance = 0;
    let highScore = localStorage.getItem('ninjaHighScore') || 0;
    let speed = 6;
    let gravity = 0.8;
    let velocity = 0;
    let isJumping = false;
    let isSliding = false;
    let frame = 0;

    const player = { x: 100, y: 250, width: 45, height: 65, baseY: 250 };

    let obstacles = [];
    let collectibles = [];
    let particles = [];
    let scorePopups = [];

    let bgX1 = 0, bgX2 = 0, bgX3 = 0;

    function updateUI() {
      scoreEl.textContent = Math.floor(score).toString().padStart(5, '0');
      distanceEl.textContent = `${Math.floor(distance)}m`;
    }

    function createScorePopup(x, y, points) {
      scorePopups.push({ x, y, points, life: 45, vy: -1.8 });
    }

    function createObstacle() {
      const types = ['drone', 'barrier', 'neon'];
      const type = types[Math.floor(Math.random() * types.length)];
      const obs = { x: canvas.width + 50, y: type === 'barrier' ? 210 : 275, width: type === 'drone' ? 45 : 40, height: type === 'drone' ? 35 : 65, type: type, passed: false };
      obstacles.push(obs);
    }

    function createCollectible() {
      collectibles.push({ x: canvas.width + Math.random() * 300, y: 140 + Math.random() * 140, width: 22, height: 22 });
    }

    function createParticle(x, y) {
      particles.push({ x, y, vx: Math.random()*4-2, vy: Math.random()*-3-1, life: 28, color: '#00ffff' });
    }

    function drawBackground() {
      ctx.fillStyle = '#0a001f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#1a0033';
      for (let i = 0; i < 8; i++) {
        let x = (i * 120 + bgX3 * 0.2) % (canvas.width + 200) - 100;
        ctx.fillRect(x, 90, 85, 320);
      }
      ctx.fillStyle = '#2a0044';
      for (let i = 0; i < 6; i++) {
        let x = (i * 180 + bgX2 * 0.5) % (canvas.width + 300) - 100;
        ctx.fillRect(x, 140, 130, 270);
      }

      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 315, canvas.width, 85);
      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(0, 315);
      ctx.lineTo(canvas.width, 315);
      ctx.stroke();
    }

    function drawNinja() {
      const px = player.x, py = player.y;
      const anim = Math.floor(frame / 6) % 2;
      ctx.save();
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 25;

      ctx.fillStyle = '#111111';
      ctx.fillRect(px + 10, py + 10, 28, 45);
      ctx.fillStyle = '#222222';
      ctx.fillRect(px + 15, py + 5, 20, 20);

      ctx.fillStyle = '#ff0044';
      ctx.fillRect(px + 13, py + 12, 24, 6);

      ctx.fillStyle = '#00ffff';
      ctx.fillRect(px + 19, py + 13, 4, 4);
      ctx.fillRect(px + 27, py + 13, 4, 4);

      ctx.fillStyle = '#111111';
      ctx.fillRect(px + 5, py + 20, 12, 8);
      ctx.fillRect(px + 33, py + 20, 12, 8);

      if (isSliding) {
        ctx.fillRect(px + 12, py + 48, 26, 18);
      } else {
        ctx.fillRect(px + 12, py + 50 + (anim * 3), 10, 18);
        ctx.fillRect(px + 25, py + 50 - (anim * 3), 10, 18);
      }

      ctx.strokeStyle = '#cccccc';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(px + 35, py + 25);
      ctx.lineTo(px + 48, py + 35);
      ctx.stroke();
      ctx.restore();
    }

    function drawObstacles() {
      for (let obs of obstacles) {
        ctx.fillStyle = obs.type === 'drone' ? '#ff3366' : (obs.type === 'barrier' ? '#9900ff' : '#00ffff');
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
      }
    }

    function drawCollectibles() {
      for (let c of collectibles) {
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ffff00';
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(c.x, c.y, c.width, c.height);
        ctx.shadowBlur = 0;
      }
    }

    function drawScorePopups() {
      ctx.textAlign = 'center';
      ctx.font = 'bold 18px Courier New';
      for (let i = scorePopups.length - 1; i >= 0; i--) {
        const p = scorePopups[i];
        ctx.globalAlpha = p.life / 45;
        ctx.fillStyle = '#ffff00';
        ctx.fillText(`+${p.points}`, p.x, p.y);
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) scorePopups.splice(i, 1);
      }
      ctx.globalAlpha = 1;
    }

    function drawParticles() {
      for (let i = particles.length-1; i >= 0; i--) {
        let p = particles[i];
        ctx.globalAlpha = p.life / 28;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 5, 5);
        p.x += p.vx; p.y += p.vy; p.life--; p.vy += 0.15;
        if (p.life <= 0) particles.splice(i,1);
      }
      ctx.globalAlpha = 1;
    }

    function drawStartScreen() {
      // Notifikasi Style
      ctx.fillStyle = 'rgba(10, 10, 40, 0.95)';
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 4;
      ctx.fillRect(150, 80, 500, 240);
      ctx.strokeRect(150, 80, 500, 240);

      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 30;

      ctx.fillStyle = '#ff00ff';
      ctx.font = 'bold 38px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('CYBER NINJA RUNNER', canvas.width/2, 130);

      ctx.shadowBlur = 15;
      ctx.fillStyle = '#00ffff';
      ctx.font = '22px Courier New';
      ctx.fillText('HIGH SCORE', canvas.width/2, 180);
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 32px Courier New';
      ctx.fillText(highScore.toString().padStart(5, '0'), canvas.width/2, 215);

      ctx.fillStyle = '#ffffff';
      ctx.font = '20px Courier New';
      ctx.fillText('TEKAN SPACE ATAU TAP LAYAR', canvas.width/2, 270);
      ctx.fillText('UNTUK MULAI BERLARI', canvas.width/2, 295);

      ctx.shadowBlur = 0;
    }

    function update() {
      if (!gameRunning) return;
      frame++;
      distance += speed * 0.3;
      score += 0.6;
      updateUI();

      if (Math.floor(score) % 500 === 0 && speed < 13) speed += 0.25;

      if (isJumping) {
        velocity += gravity;
        player.y += velocity;
        if (player.y >= player.baseY) {
          player.y = player.baseY;
          isJumping = false;
          velocity = 0;
        }
      }

      if (isSliding) {
        player.height = 35;
        player.y = player.baseY + 30;
      } else if (!isJumping) {
        player.height = 65;
        player.y = player.baseY;
      }

      bgX1 -= speed * 1.3; bgX2 -= speed * 0.8; bgX3 -= speed * 0.4;
      if (bgX1 < -canvas.width) bgX1 = 0;
      if (bgX2 < -canvas.width) bgX2 = 0;
      if (bgX3 < -canvas.width) bgX3 = 0;

      if (frame % 42 === 0) createObstacle();
      if (frame % 48 === 0) createCollectible();

      for (let i = obstacles.length-1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.x -= speed;
        if (!obs.passed && obs.x + obs.width < player.x) {
          obs.passed = true;
          playBeep(1200, 60, 'square', 0.25);
        }
        if (obs.x < -100) obstacles.splice(i,1);
      }

      for (let i = collectibles.length-1; i >= 0; i--) {
        let c = collectibles[i];
        c.x -= speed;
        if (c.x < -50) { collectibles.splice(i,1); continue; }

        if (player.x + player.width > c.x && player.x < c.x + c.width &&
            player.y + player.height > c.y && player.y < c.y + c.height) {
          const points = 60 + Math.floor(Math.random() * 40);
          score += points;
          createScorePopup(c.x + 10, c.y - 10, points);
          playBeep(1600, 120, 'sine', 0.4);
          for (let j = 0; j < 12; j++) createParticle(c.x + 10, c.y + 10);
          collectibles.splice(i,1);
        }
      }

      for (let obs of obstacles) {
        if (player.x + player.width > obs.x && player.x < obs.x + obs.width &&
            player.y + player.height > obs.y && player.y < obs.y + obs.height) {
          playBeep(400, 300, 'sawtooth', 0.5);
          gameOver();
          return;
        }
      }

      if (frame % 5 === 0 && !isJumping) createParticle(player.x + 15, player.y + player.height - 8);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();
      drawObstacles();
      drawCollectibles();
      drawNinja();
      drawParticles();
      drawScorePopups();
    }

    function gameLoop() {
      if (!gameRunning) {
        drawBackground();
        drawNinja();
        drawStartScreen();
      } else {
        update();
        draw();
      }
      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      gameRunning = true;
      score = 0; distance = 0; speed = 6;
      obstacles = []; collectibles = []; particles = []; scorePopups = [];
      player.y = player.baseY;
      isJumping = isSliding = false;
      updateUI();
    }

    function gameOver() {
      gameRunning = false;
      const finalScore = Math.floor(score);
      if (finalScore > highScore) {
        highScore = finalScore;
        localStorage.setItem('ninjaHighScore', highScore);
      }

      ctx.fillStyle = 'rgba(0, 0, 0, 0.92)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 40;

      ctx.fillStyle = '#ff00ff';
      ctx.font = 'bold 38px Courier New';
      ctx.fillText('TOTAL SCORE', canvas.width/2, 130);

      ctx.shadowBlur = 60;
      ctx.fillStyle = '#ffff00';
      ctx.font = 'bold 72px Courier New';
      ctx.fillText(finalScore.toString().padStart(5, '0'), canvas.width/2, 210);

      ctx.shadowBlur = 20;
      ctx.fillStyle = '#00ffff';
      ctx.font = 'bold 26px Courier New';
      ctx.fillText(`DISTANCE: ${Math.floor(distance)}m`, canvas.width/2, 260);

      ctx.font = '22px Courier New';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(`HIGH SCORE: ${highScore}`, canvas.width/2, 295);

      ctx.fillStyle = '#ff00ff';
      ctx.font = 'bold 20px Courier New';
      ctx.fillText('TEKAN SPACE UNTUK MAIN LAGI', canvas.width/2, 340);
      ctx.shadowBlur = 0;
    }

    // Controls
    document.addEventListener('keydown', e => {
      if (e.key === ' ' && !gameRunning) startGame();
      if (!gameRunning) return;

      if ((e.key === ' ' || e.key === 'ArrowUp') && !isJumping) {
        velocity = -18;
        isJumping = true;
        playBeep(900, 50);
      }
      if (e.key === 'ArrowDown') isSliding = true;
    });

    document.addEventListener('keyup', e => {
      if (e.key === 'ArrowDown') isSliding = false;
    });

    canvas.addEventListener('touchstart', e => {
      if (!gameRunning) { startGame(); return; }
      if (e.touches[0].clientX < canvas.width / 2) {
        if (!isJumping) { 
          velocity = -18; 
          isJumping = true;
          playBeep(900, 50);
        }
      } else {
        isSliding = true;
      }
    });
    canvas.addEventListener('touchend', () => isSliding = false);

    gameLoop();
  </script>
</body>
</html>
